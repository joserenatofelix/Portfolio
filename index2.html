<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habilidades</title>    
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    padding: 20px;
}

.skill-bars {
    display: flex;
    flex-wrap: wrap;
}

.skill {
    width: 100%;
    margin-bottom: 10px;
}

.skill-name {
    font-weight: bold;
    margin-bottom: 5px;
}

.skill-level {
    background-color: #3498db;
    height: 20px;
    border-radius: 10px;
    width: 0;
    transition: width 1s ease;
}

/* Estilizando a barra de porcentagem */
.skill-level::after {
    content: attr(data-percentage);
    display: block;
    color: #fff;
    font-size: 12px;
    text-align: center;
    line-height: 20px;
    border-radius: 10px;
    background-color: #2980b9;
}

</style>
</head>
<div class="skill-bars">
    <div class="skill-bars">
        <div class="skill">
            <div class="skill-name">Habilidade 1</div>
            <div class="skill-level" data-percentage="85%"></div>
        </div>
        <!-- Adicione mais 9 blocos de habilidades aqui -->
    </div>

    
</div>

<script>
    window.addEventListener("DOMContentLoaded", () => {
    const skillLevels = document.querySelectorAll(".skill-level");

    skillLevels.forEach((skill) => {
        const percentage = skill.getAttribute("data-percentage");
        skill.style.width = percentage;
    });
});

</script>
</body>
</html>
