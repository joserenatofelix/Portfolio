<!DOCTYPE html>
<html>
<head>
  <title>Certificados</title>
  <style>
    body {
        background-color: #0ba2dd;
        font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      color: blueviolet;
    }
    
    .certificados-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-top: 20px;
    }
    
    .certificado {
      width: calc(50% - 10px);
      background-color: #300e0e;
      border: 1px solid #94da24;
      padding: 10px;
      box-sizing: border-box;
      margin-bottom: 20px;
    }
    
    .certificado img {
      max-width: 100%;
      height: auto;     
}
   
#arrow {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background-color: #006eff;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 50px;
      font-size: 20px;
      cursor: pointer;
    }

    #back-button {
      position: fixed;
      left: 20px;
      top: 5%;
      transform: translateY(-50%);
      padding: 10px 20px;
      background-color: #006eff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
    }
   
  </style>
</head>
<body>
